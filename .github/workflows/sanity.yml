name: Sanity

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Check protocol conformance
        run: python3 scripts/check_protocol_conformance.py
      - name: Run regression suite
        run: python3 -m unittest tests.test_sovereign_mesh
      - name: Check server help
        run: python3 server.py --help
      - name: Check starter help
        run: ./scripts/start_ocp.sh --help
